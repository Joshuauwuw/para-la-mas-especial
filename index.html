<!DOCTYPE html>
<html>
<head>
<title>Acceso especial ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
z-index:2;
}

h1{
color:#ff4d6d;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
}

button{
margin-top:15px;
padding:10px 20px;
background:#ff4d6d;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#ff1e4d;
}

#error{
color:red;
margin-top:10px;
}

/* corazones */

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:flotar 6s linear infinite;
}

@keyframes flotar{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

<script>

function verificar(){

let password = document.getElementById("clave").value;

if(password == "100522"){
window.location.href="cielo.html";
}else{
document.getElementById("error").innerHTML="Contraseña incorrecta 💔";
}

}

/* crear corazones */

function crearCorazon(){

const corazon=document.createElement("div");
corazon.classList.add("heart");
corazon.innerHTML="❤️";

corazon.style.left=Math.random()*100+"vw";
corazon.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(corazon);

setTimeout(()=>{
corazon.remove();
},6000);

}

setInterval(crearCorazon,300);

</script>

</head>

<body>

<div class="container">

<h1>Bienvenida mi amor ❤️</h1>

<p>Ingresa nuestra fecha especial</p>

<input type="password" id="clave" placeholder="DDMMYY">

<br>

<button onclick="verificar()">Entrar</button>

<p id="error"></p>

</div>

</body>
</html>
